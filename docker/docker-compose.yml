version: '3.9'

services:
  # ──────────────────────────────────────────
  # PostgreSQL 데이터베이스
  # ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: gwons_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gwons
      POSTGRES_PASSWORD: gwons_pass
      POSTGRES_DB: gwons_creative
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gwons -d gwons_creative"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # Backend API (NestJS)
  # ──────────────────────────────────────────
  backend:
    build:
      context: ../apps/backend
      dockerfile: ../../docker/Dockerfile.backend
    container_name: gwons_backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: gwons
      DB_PASS: gwons_pass
      DB_NAME: gwons_creative
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../apps/backend/src:/app/src

  # ──────────────────────────────────────────
  # Frontend (React + Vite)
  # ──────────────────────────────────────────
  frontend:
    build:
      context: ../apps/frontend
      dockerfile: ../../docker/Dockerfile.frontend
    container_name: gwons_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ../apps/frontend/src:/app/src

volumes:
  postgres_data:
